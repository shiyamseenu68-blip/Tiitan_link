version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: titanlink-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - titanlink-network

  redis:
    image: redis:7-alpine
    container_name: titanlink-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - titanlink-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: titanlink-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/titanlink?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-your-refresh-secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      - mongodb
      - redis
    networks:
      - titanlink-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: titanlink-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - titanlink-network

volumes:
  mongodb_data:
  redis_data:

networks:
  titanlink-network:
    driver: bridge
